#Infrared config
infrared_input:
  pin_number: 17  # the GPIO pin number connected to the infrared sensor
  chip_number: 0  # the chip number of the sensor
  type: ANALOG ##########################DIGITAL or ANALOG # Choose between DIGITAL or ANALOG sensor
  open_threshold_value: 1 #the value of the sensor, below which traffic is detected. 1 for digital sensor, <Ir sensor datasheet> for analog sensor
  read_interval: 5000   # the time between sensor reading in milliseconds
  max_blocked_time: 60000  #The time in which the sensor is blocked to trigger traffic flow detection in milliseconds

#hardware output config
Hardware_output:
  speaker:
    available: false
    pin_number: 23
    direction: out
  buzzer:
    available: true
    pin_number: 24
    direction: out
    volume: 50
  LED:
    chip_number: 0  # the chip number of the sensor
    available: true
    pin_number: 17
    direction: out


