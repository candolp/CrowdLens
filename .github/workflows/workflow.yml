name: workflow.yml
on:
  push:
    branches: [ main, master, develop* ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t crowdlens-test .

      - name: Run Docker container and capture output
        run: |
          docker run --rm crowdlens-test > docker-test.log 2>&1 || true
          echo "=== Full Container Output ==="
          cat docker-test.log          # print everything, not just tail
          if tail -n 10 docker-test.log | grep -q "100% tests passed"; then
            echo "Test passed"
          else
            echo "Test failed"
            exit 1
          fi
        shell: /usr/bin/bash -e {0}