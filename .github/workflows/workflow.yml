name: workflow.yml
on:
  push:
    branches: [ main, master, develop* ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t crowdlens-test .

      - name: Run Docker container and capture output
        run: |
          docker run --rm crowdlens-test > docker-test.log 2>&1
          tail -n 300 docker-test.log
          
          if tail -n 10 docker-test.log | grep -q "100% tests passed"; then
            echo -e "\033[0;32mTest passed\033[0m"
          else
            echo -e "\033[0;31mTest failed: expected '100% tests passed' in the last 2 lines\033[0m"
            exit 1
          fi